org.gradle.configuration-cache=true
org.gradle.parallel=true
org.gradle.caching=true
# Pin JVM — sin esto Gradle usa el java del PATH del shell, que puede ser incorrecto
org.gradle.java.home=/Users/marcomontilla/.sdkman/candidates/java/current
# Cap daemon RAM
org.gradle.jvmargs=-Xmx512m -XX:MaxMetaspaceSize=256m
# Apagar daemons idle después de 2 minutos (default: 3 horas)
org.gradle.daemon.idletimeout=120000
