apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zot
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://zotregistry.dev/helm-charts
    chart: zot
    targetRevision: "0.1.119"
    helm:
      releaseName: zot
      values: |
        replicaCount: 1

        image:
          repository: ghcr.io/project-zot/zot
          pullPolicy: IfNotPresent
          tag: "v2.1.18"

        service:
          type: NodePort
          port: 5000
          nodePort: 30500

        persistence: true

        pvc:
          create: true
          name: zot-pvc
          accessModes: ["ReadWriteOnce"]
          storage: 10Gi
          storageClassName: local-path

        config:
          distSpecVersion: "1.1.0"
          storage:
            rootDirectory: /var/lib/registry
          http:
            address: "0.0.0.0"
            port: "5000"
          log:
            level: info

        startupProbe:
          httpGet:
            path: /v2/
            port: 5000
          failureThreshold: 10
          periodSeconds: 10
          initialDelaySeconds: 10

        livenessProbe:
          httpGet:
            path: /v2/
            port: 5000
          failureThreshold: 5
          periodSeconds: 15
          initialDelaySeconds: 15

        readinessProbe:
          httpGet:
            path: /v2/
            port: 5000
          failureThreshold: 3
          periodSeconds: 10
          initialDelaySeconds: 10

  destination:
    server: https://kubernetes.default.svc
    namespace: zot

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
