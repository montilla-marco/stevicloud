apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: product-catalog
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/montilla-marco/stevicloud.git
    targetRevision: main
    path: stevidigital-platform/apps/product-catalog/k8s-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: product-catalog
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
