apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: "0.162.0"
    helm:
      releaseName: otel-collector
      values: |
        mode: deployment

        image:
          repository: otel/opentelemetry-collector-contrib

        replicaCount: 1

        config:
          extensions:
            health_check:
              endpoint: ${env:MY_POD_IP}:13133

          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: "0.0.0.0:4317"
                http:
                  endpoint: "0.0.0.0:4318"

          processors:
            memory_limiter:
              check_interval: 5s
              limit_percentage: 80
              spike_limit_percentage: 25
            batch: {}

          exporters:
            otlp/tempo:
              endpoint: tempo.monitoring.svc.cluster.local:4317
              tls:
                insecure: true
            debug: {}

          service:
            extensions:
              - health_check
            telemetry:
              resource:
                k8s.namespace.name: "${env:OTEL_K8S_NAMESPACE}"
                k8s.pod.name: "${env:OTEL_K8S_POD_NAME}"
              metrics:
                readers:
                  - pull:
                      exporter:
                        prometheus:
                          host: ${env:MY_POD_IP}
                          port: 8888
            pipelines:
              traces:
                receivers:
                  - otlp
                processors:
                  - memory_limiter
                  - batch
                exporters:
                  - otlp/tempo

        resources:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 256Mi
            cpu: 200m

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
