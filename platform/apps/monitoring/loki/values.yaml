loki:
  enabled: true
  isDefault: false
  datasource:
    uid: loki
  persistence:
    enabled: true
    storageClassName: local-path
    size: 10Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 200m

promtail:
  enabled: true
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

# Grafana is already provided by kube-prometheus-stack
grafana:
  enabled: false
