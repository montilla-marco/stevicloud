[defaults]
roles_path          = ansible/roles
host_key_checking   = False
stdout_callback     = default
callbacks_enabled   = profile_tasks
retry_files_enabled = False
private_key_file    = ~/.orbstack/ssh/id_ed25519
interpreter_python  = /usr/bin/python3
remote_tmp          = /tmp/.ansible-${USER}

[callback_default]
# Salida en YAML, reemplaza al antiguo callback community.general.yaml
result_format = yaml

[ssh_connection]
pipelining    = False
ssh_args      = -o ControlMaster=no -o StrictHostKeyChecking=no